# === General ===
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -g set-clipboard on

# === Prefix: Ctrl-b (default) ===
set -g prefix C-b
bind C-b send-prefix

# === Splits: | and - (intuitive) ===
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# === Pane navigation: Alt+arrow (no prefix needed) ===
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# === Pane resize: Ctrl+arrow (no prefix needed) ===
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# === Window navigation ===
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-h previous-window
bind -n M-l next-window

# === Window reorder: Alt+Shift+H/L (move current window left/right) ===
bind -n M-H swap-window -d -t -1
bind -n M-L swap-window -d -t +1

# === Reload config ===
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# === Copy mode (vi keys) ===
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clip.exe"

# === Status bar ===
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=#bac2de]%H:%M #[fg=#1e1e2e,bg=#a6e3a1,bold] #H "
set -g status-right-length 50
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "

# === Pane borders ===
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# === Cheatsheet: Ctrl-a ? opens in a popup ===
bind ? display-popup -w 80% -h 80% -E "cat ~/.tmux/cheatsheet.md | less"

# === Plugins ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key' # Shows key hints after prefix
set -g @plugin 'tmux-plugins/tmux-resurrect'  # Save/restore sessions

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
